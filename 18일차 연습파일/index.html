<body>
    <h1>position</h1>
    <p>position은 위치를 지정하는 속성이다.</p>
    <p><mark>값 종류</mark><span>static(기본값), absolute, fixed, relative</span></p>

    <h2>static(기본값)</h2>
    <p>static: X와Y축을 지정할 수 없다.</p>
    <p><span>#display 이동</span> <span>#transform 이용</span></p>
    <div class="static">static</div>
    
    <div class="absolute">absolute</div>
    <div class="fixed">fixed</div>

    <h2>relative: absolute의 x와y좌표 기준 지정</h2>
    <p>부모태그만 지정x -> absolute위에 있는 모든 태그에 지정 가능(혈연)</p>
    <p>위치속성(left, right, top, bottom) 사용x</p>
    <div class="relative">relative
        <div class="absolute">absolute</div>
    </div>
